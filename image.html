<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertisseur d'Images</title>
    <link rel="stylesheet" href="assets/CSS/style.css">
    <script src="assets/js/image.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Convertisseur d'Images</h1>
        <form id="convertForm">
            <div class="form-group">
                <label for="file">Télécharger une image :</label>
                <input type="file" id="file" name="file" required accept="image/*">
            </div>
            <div class="form-group">
                <label for="format">Format de sortie :</label>
                <select id="format" name="format" required>
                    <option value="jpeg">JPEG</option>
                    <option value="png">PNG</option>
                    <option value="bmp">BMP</option>
                    <option value="gif">GIF</option>
                    <option value="tiff">TIFF</option>
                    <option value="ico">ICO</option>
                    <option value="webp">WEBP</option>
                </select>
            </div>
            <button type="submit">Convertir</button>
        </form>
        <div id="previewContainer"></div>
        <a id="downloadLink" href="#" download style="display:none;">Télécharger l'image convertie</a>
    </div>
</body>
</html>
